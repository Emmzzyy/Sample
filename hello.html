<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Greet You</title>
		<style>
			body { font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f3f4f6 }
			.card { background:white; padding:24px; border-radius:8px; box-shadow:0 4px 14px rgba(0,0,0,0.08); width:320px; text-align:center }
			input { width:100%; padding:8px 10px; margin-top:12px; border:1px solid #d1d5db; border-radius:6px }
			button { margin-top:12px; padding:8px 12px; border:none; background:#2563eb; color:white; border-radius:6px; cursor:pointer }
			.greeting { margin-top:16px; font-weight:600 }
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Hello!</h1>
			<p>What's your name?</p>
			<label for="name" style="display:none">Name</label>
			<input id="name" type="text" placeholder="Enter your name" />
			<button id="greetBtn">Greet me</button>
			<div id="greeting" class="greeting" aria-live="polite"></div>
		</div>

		<script>
			const nameInput = document.getElementById('name');
			const btn = document.getElementById('greetBtn');
			const out = document.getElementById('greeting');

			function greet() {
				const name = nameInput.value.trim();
				if (name) out.textContent = `Nice to meet you, ${name}!`;
				else out.textContent = 'Nice to meet you!';
			}

			btn.addEventListener('click', greet);
			nameInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') greet(); });
		</script>
	</body>
</html>
